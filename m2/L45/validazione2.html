<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container">
        <div class="col-12">
            <h1>Validazione Form</h1>
        </div>
        <div class="col-12">
            <!-- <form id="myForm"> -->

                <div class="form-group">
                    <!-- pattern è un attributo dei campi dei form -->
                    <input type="text" class="form-control" pattern="[a-zA-Z]{2,15}"  required id="nome" placeholder="nome*">
                    <span class="text-danger"></span>
                </div>
                <div class="form-group">
                    <!-- Non c'è attributo required, quindi questo campo non è obbligatorio -->
                    <input type="text" class="form-control" id="cognome" placeholder="cognome">
                    <span class="text-danger"></span>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" required id="email" placeholder="email*">
                    <span class="text-danger"></span>
                </div>
                <div class="form-group">
                    <input type="password" autocomplete="password" required class="form-control" id="password" placeholder="password*">
                    <span class="text-danger"></span>
                    <button type="button" id="password-toggle" class="btn btn-info">Mostra</button>
                </div>

                <button id="formBtn" class="btn btn-primary">Invia</button>

            <!-- </form> -->
        </div>
    </div>
    
    <script>

        const formBtn = document.querySelector('#formBtn');
        //validazione form
        formBtn.addEventListener('click',function(e){
            
            const requiredFields = document.querySelectorAll('input[required]');
            const [nome, email, password] = requiredFields;

            let valid = true;
            
            // Espressione regolare che trova una email all'interno di un testo
            const emailRegex = /^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/g;

            // Il metodo checkValidity() È un metodo che puoi adoperare sui campi di un form per verificare se sono validi o meno. La validità è determinata dalla presenza di attributi per la validazione di html. 
            requiredFields.forEach(field => {
                if(!field.checkValidity()){
                    valid = false;
                    field.nextElementSibling.innerText = field.validationMessage;
                }else{
                    field.nextElementSibling.innerText = ""
                }
            })

            console.log(
                email.checkValidity(),
                email.validationMessage,
                email.validity
            );

            console.log(
                nome.checkValidity(),
                nome.validationMessage,
                nome.validity
            );
            
            if(nome.validity.patternMismatch){
                //avviso l'utente che non ha rispettato il pattern e gli dico quale pattern è richiesto
            }
           
            
            if(valid){
                //invia i dati al server
            }

        })




        const passwordToggle = document.getElementById('password-toggle');

        //funzionamento mostra password
        passwordToggle.addEventListener('click',function(){
            const pwdInput = document.getElementById('password');
            const isHidden = pwdInput.type === "password";

            pwdInput.type = isHidden ? "text" : "password"
            passwordToggle.innerText = isHidden ? "Nascondi" : "Mostra"
        })









    </script>

</body>
</html>
