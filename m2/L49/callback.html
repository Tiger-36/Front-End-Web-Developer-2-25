<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="testo1"></div>
    <div id="testo2"></div>
    <div id="testo3"></div>

    <script>

        function grassetto(stringa){
            return `<b>${stringa}</b>`;
        }

        function corsivo(stringa){
            return `<i>${stringa}</i>`;
        }

        function scrivi(selettore, testo, callback){
            const elemento = document.querySelector(selettore);
            if(!elemento) return;
            // L'argomento callback Si presume che sia una funzione 
            //Chi utilizza la funzione scrivi dovrà fornire una funzione di call back che deciderà come deve essere gestito il parametro testo e dovrà obbligatoriamente restituirlo. 
            elemento.innerHTML = callback(testo); 
        }


        scrivi('#testo1', "ciao", grassetto)
        scrivi('#testo2', "Buongiorno", corsivo)
        scrivi('#testo3', "Arrivederci", t => t + '!!!')


        //Questa funzione riproduce la logica del metodo map degli array
        //Ci è servita solo per fare un esempio Utilizzando qualcosa che già conoscete 
        function map(array, callback){
            const res = [];

            for(let el of array){
                res.push( callback(el) )
            }

            return res;
        }


        const numeri = [1,2,3,4,5,6,7,8,9];

        const numeriDoppi = map(numeri, n => {n * 2});
        console.log(numeriDoppi);

    </script>

</body>
</html>
