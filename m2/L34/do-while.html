<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        /**
         * 
         * La variante while è un ciclo che esegue prima di valutare la condizione. Il blocco du viene eseguito anche se la condizione non è mai vera. 
         * Il ciclo do while è utile quando vogliamo eseguire almeno una volta un blocco di codice, indipendentemente dal fatto che la condizione sia vera o falsa.
         * 
         */

        let count = 6;
        
        do{
            console.log("Count vale " + count);
            count++;

        }while(count <= 5)

        console.log("Ciclo finito");
        

    </script>
</body>
</html>
